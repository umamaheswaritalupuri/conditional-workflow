name: Conditional CI Pipeline

on:
  push:
    branches:
      - 'feature/**'
jobs:
  build:
    if: startsWith(github.ref, 'refs/heads/feature/') && success()
    runs-on: ubuntu-latest
    steps:
      - run: echo "build"
  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - run: echo "test"
