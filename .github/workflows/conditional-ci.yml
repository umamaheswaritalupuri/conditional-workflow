name: conditional-workflow

on:
  push:
    branches:
      - 'feature/**'
jobs:
  build:
    if: startsWith(github.ref_name, 'refs/heads/feature/')
    runs-on: ubuntu-latest
    steps:
      - runs: echo "build"
  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - runs: echo "test"
